name: LaTeX-PDF Documentation

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions: write-all

jobs:
  build-latex:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Cache virtual environment
        uses: actions/cache@v6
        id: cache-venv
        with:
          path: .venv
          key: ${{ runner.os }}-venv-docs-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'pyproject.toml', 'MANIFEST.in') }}
          restore-keys: |
            ${{ runner.os }}-venv-docs-${{ matrix.python-version }}-
      - name: Create and install dependencies
        if: steps.cache-venv.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install .[docs]
      - name: Build LaTeX
        run: |
          source .venv/bin/activate
          rm -rf latex/
          rm -rf docs/quality_documentation/latex/
          python3 -m sphinx docs latex -b latex
          cp -r latex ./docs/quality_documentation/latex
      - name: Compile PDF
        uses: xu-cheng/latex-action@v4
        with:
          working_directory: docs/quality_documentation/latex
          root_file: user_manual.tex
          latexmk_use_lualatex: false
          latexmk_use_xelatex: false
          continue_on_error: true
      - name: Upload LaTeX files for debugging
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: latex-debug-files
          path: |
            docs/quality_documentation/latex/user_manual.tex
            docs/quality_documentation/latex/user_manual.log
          retention-days: 1
      - name: Copy PDF to root
        run: cp docs/quality_documentation/latex/user_manual.pdf user_manual.pdf
      - name: Upload PDF
        uses: actions/upload-artifact@v7
        with:
          name: user-manual
          path: user_manual.pdf
          retention-days: 1

