name: Full Test

on:
  workflow_dispatch:

jobs:
  tox:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: getsentry/action-setup-venv@v3.2.0
        id: venv
        with:
          python-version: ${{ matrix.python-version }}
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
            MANIFEST.in
          install-cmd: pip install .[dev] .[pyside2]
      - name: Run Tox tests
        run: |
          mkdir test_report
          source .venv/bin/activate
          export GITLAB_CI="GITLAB_CI"
          tox -- --runslow -m slow
      - name: Upload test report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test_report/
          retention-days: 1
